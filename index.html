<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VEX-Sim | Path Editor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo">VEX-Sim <span class="version">v2.0</span></div>

            <section class="config-group">
                <h3>Robot Config</h3>
                <div class="input-row">
                    <label>Track Width</label>
                    <input type="number" id="trackWidth" value="12">
                </div>
            </section>

            <section class="timeline-group">
                <h3>Autonomous Path</h3>
                <div id="path-list" class="scroll-list">
                    <div class="path-item">1. Start (300, 300)</div>
                </div>
                <button class="primary-btn" onclick="runPath()">▶ Run Autonomous</button>
                <button class="secondary-btn" onclick="resetRobot()">↺ Reset Position</button>
                <button class="secondary-btn" style="background: #622;" onclick="clearPath()">🗑️ Clear Path</button>
            </section>

            <section class="config-group">
                <h3>Drift & Slip</h3>
                <div class="input-row">
                    <label>Mode</label>
                    <select id="slipMode" onchange="toggleSlipUI()">
                        <option value="random">Random Jitter</option>
                        <option value="constant">Constant Bias</option>
                    </select>
                </div>

                <div id="random-ui">
                    <div class="input-row">
                        <label>Intensity: <span id="slip-val">0</span></label>
                        <input type="range" id="slipIntensity" min="0" max="0.1" step="0.01" value="0"
                            oninput="document.getElementById('slip-val').innerText = this.value">
                    </div>
                </div>

                <div id="constant-ui" style="display:none;">
                    <div class="input-row">
                        <label>Weak Side</label>
                        <select id="biasSide">
                            <option value="L">Left Motor</option>
                            <option value="R">Right Motor</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <label>Loss: <span id="bias-val">5</span>%</label>
                        <input type="range" id="biasAmount" min="0" max="0.2" step="0.01" value="0.05"
                            oninput="document.getElementById('bias-val').innerText = Math.round(this.value * 100)">
                    </div>
                </div>
            </section>
        </aside>

        <main class="viewport">
            <div class="canvas-container">
                <canvas id="fieldCanvas" width="600" height="600"></canvas>
                <div class="coord-overlay">X: <span id="ui-x">0</span> Y: <span id="ui-y">0</span></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
